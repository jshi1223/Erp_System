<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - KVSK CCTV & IT Solution</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <a class="login-brand login-brand-link" href="/" aria-label="Go to landing page">
      <img class="login-brand-mark" src="assets/img/kvsk-logo.jpg" alt="KVSK CCTV & IT Solution logo" />
      <div class="login-brand-copy">
        <div class="login-logo">KVSK CCTV & IT Solution</div>
        <div class="login-company">Security, surveillance, and IT operations portal</div>
      </div>
    </a>
    <div class="login-spotlight" aria-label="Portal highlights">
      <span class="login-spotlight-pill">Secure recovery</span>
      <span class="login-spotlight-pill">8+ character policy</span>
      <span class="login-spotlight-pill">Session safe</span>
    </div>

    <div class="form-container">
      <div class="login-badge">ACCOUNT RECOVERY</div>
      <h2 class="login-heading">Set New Password</h2>
      <p class="form-note">Set a new password to restore access to your account.</p>
      <p class="form-note">Recommended: at least 8 characters with a mix of letters and numbers.</p>

      <div class="field">
        <label for="new-password">New Password</label>
        <div class="password-input-wrap">
          <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password" />
          <button class="password-toggle" type="button" data-target="new-password" aria-label="Show password" title="Show password">
            <svg class="icon-eye-open" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5C6.6 5 2.2 8.2 1 12c1.2 3.8 5.6 7 11 7s9.8-3.2 11-7c-1.2-3.8-5.6-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"></path>
              <circle cx="12" cy="12" r="2.2"></circle>
            </svg>
            <svg class="icon-eye-closed" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 5.3 3.4 4 20 20.6 18.6 22l-3-3c-1.1.4-2.3.7-3.6.7-5.4 0-9.8-3.2-11-7 .5-1.6 1.6-3.1 3.1-4.3L2 5.3zm9.2 9.2 3 3a4 4 0 0 1-5.9-5.9l3 3zm10.8-2.2c-.4 1.3-1.2 2.6-2.3 3.6l-1.5-1.5c.7-.7 1.2-1.5 1.6-2.4-1.2-3-4.8-5.3-8.8-5.3-1 0-2 .1-2.9.5L6.5 5.7A13.2 13.2 0 0 1 12 4.9c5.4 0 9.8 3.2 11 7.4z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <div class="password-input-wrap">
          <input type="password" id="confirm-password" placeholder="Re-enter your new password" autocomplete="new-password" />
          <button class="password-toggle" type="button" data-target="confirm-password" aria-label="Show password" title="Show password">
            <svg class="icon-eye-open" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5C6.6 5 2.2 8.2 1 12c1.2 3.8 5.6 7 11 7s9.8-3.2 11-7c-1.2-3.8-5.6-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"></path>
              <circle cx="12" cy="12" r="2.2"></circle>
            </svg>
            <svg class="icon-eye-closed" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 5.3 3.4 4 20 20.6 18.6 22l-3-3c-1.1.4-2.3.7-3.6.7-5.4 0-9.8-3.2-11-7 .5-1.6 1.6-3.1 3.1-4.3L2 5.3zm9.2 9.2 3 3a4 4 0 0 1-5.9-5.9l3 3zm10.8-2.2c-.4 1.3-1.2 2.6-2.3 3.6l-1.5-1.5c.7-.7 1.2-1.5 1.6-2.4-1.2-3-4.8-5.3-8.8-5.3-1 0-2 .1-2.9.5L6.5 5.7A13.2 13.2 0 0 1 12 4.9c5.4 0 9.8 3.2 11 7.4z"></path>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-primary" id="btn-reset" type="button">Update Password</button>
      <div id="msg" class="err-msg"></div>

      <div style="text-align:center; margin-top: 12px;">
        <a href="/" class="forgot-link" style="margin: 0;">Back to Login</a>
      </div>
    </div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const btnReset = document.getElementById('btn-reset');
  const msg = document.getElementById('msg');

  function setLoading(loading) {
    if (loading) {
      btnReset.classList.add('loading');
      btnReset.disabled = true;
      btnReset.textContent = 'Updating...';
    } else {
      btnReset.classList.remove('loading');
      btnReset.disabled = false;
      btnReset.textContent = 'Update Password';
    }
  }

  function showMessage(text, type) {
    msg.className = type === 'success' ? 'err-msg success-msg' : 'err-msg';
    msg.textContent = text;
  }

  if (!token) {
    btnReset.disabled = true;
    showMessage('Invalid reset link. Humingi ulit ng bagong reset link.', 'error');
  }

  async function submitReset() {
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    msg.className = 'err-msg';
    msg.textContent = '';

    if (!password || password.length < 8) {
      showMessage('Password must be at least 8 characters.', 'error');
      return;
    }

    if (password !== confirm) {
      showMessage('Passwords do not match.', 'error');
      return;
    }

    setLoading(true);
    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: password })
      });

      const data = await res.json();
      if (data.status === 'success') {
        showMessage('Success! Redirecting to login...', 'success');
        setTimeout(() => { window.location.href = '/'; }, 2000);
      } else {
        showMessage(data.message || 'Unable to reset password.', 'error');
      }
    } catch (_) {
      showMessage('Cannot connect to server. Please try again.', 'error');
    } finally {
      setLoading(false);
    }
  }

  btnReset.addEventListener('click', submitReset);
  document.querySelectorAll('.password-toggle').forEach((btn) => {
    btn.addEventListener('click', () => {
      const targetId = btn.getAttribute('data-target');
      const input = document.getElementById(targetId);
      if (!input) return;

      const willShow = input.type === 'password';
      input.type = willShow ? 'text' : 'password';
      btn.classList.toggle('is-visible', willShow);
      const nextLabel = willShow ? 'Hide password' : 'Show password';
      btn.setAttribute('aria-label', nextLabel);
      btn.setAttribute('title', nextLabel);
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !btnReset.disabled) {
      submitReset();
    }
  });
</script>

</body>
</html>
