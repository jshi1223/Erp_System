<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinaadman ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Same stylesheets + body class as the ADMIN page, so the React UI matches it. -->
    <link rel="stylesheet" href="/assets/css/shared-ui.css" />
    <link rel="stylesheet" href="/assets/css/shared.css" />
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/roles/role-admin.css" />
    <link rel="stylesheet" href="/admin/css/roles/role-super-admin.css" />
    <link rel="stylesheet" href="/assets/css/warm-minimal.css" />
    <!-- Apply the active workspace's brand color BEFORE paint (flicker-free, consistent on refresh).
         Mirrors auth-guard.js for the React pages, which don't load auth-guard. -->
    <script>
      (function () {
        try {
          var ctx = String(localStorage.getItem('kinaadman_businessEntityContext') || '').trim().toLowerCase();
          // "All Companies" (or no selection) always uses the neutral slate theme, not a stale stored one.
          var NEUTRAL = { theme: 'neutral', primary: '#334155', primaryLight: '#64748b', primaryDark: '#1e293b', accent: '#475569', accent2: '#0f172a' };
          var t = (!ctx || ctx === 'all') ? NEUTRAL : JSON.parse(localStorage.getItem('kinaadman_businessEntityTheme') || 'null');
          if (!t || !t.theme) return;
          function setVars(el) {
            if (!el || !el.style) return;
            if (t.primary) el.style.setProperty('--primary', t.primary);
            if (t.primaryLight) el.style.setProperty('--primary-light', t.primaryLight);
            if (t.primaryDark) el.style.setProperty('--primary-dark', t.primaryDark);
            if (t.accent) el.style.setProperty('--accent', t.accent);
            if (t.accent2) el.style.setProperty('--accent2', t.accent2);
          }
          setVars(document.documentElement);
          document.documentElement.setAttribute('data-business-entity-theme', t.theme);
          document.addEventListener('DOMContentLoaded', function () {
            setVars(document.body);
            if (document.body) document.body.setAttribute('data-business-entity-theme', t.theme);
          });
        } catch (e) { /* no theme yet */ }
      })();
    </script>
    <script type="module" crossorigin src="/react/assets/index-Ba2OUlpQ.js"></script>
    <link rel="stylesheet" crossorigin href="/react/assets/index-BVQ-jckB.css">
  </head>
  <body class="erp-clean-page">
    <div id="root"></div>
    <!-- Classic helper (resolved at runtime, not bundled): yellow-spotlights the row you
         arrived at from the global dashboard search (?q=). Matches the other module pages. -->
    <script src="/assets/js/search-highlight.js"></script>
  </body>
</html>
