<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KVSK CCTV & IT Solution - Business Entities</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="/assets/js/auth-guard.js?v=20260521v"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/shared.css?v=20260521s" />
  <link rel="stylesheet" href="/business-entities/business-entities.css?v=20260521s" />
</head>
<body class="business-entities-page erp-clean-page">
  <header>
    <div class="header-left" style="display:flex; align-items:center; gap:15px;">
      <button class="btn-icon sidebar-toggle-btn" type="button" onclick="toggleSidebar()" title="Menu" aria-label="Open menu">
        <svg class="sidebar-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16"></path>
        </svg>
      </button>
      <button class="brand-link" type="button" onclick="window.location.href='/admin?view=dashboard'" aria-label="Go back to dashboard">
        <div class="brand-lockup">
          <img class="brand-mark" src="/assets/img/kvsk-logo.jpg" alt="KVSK CCTV & IT Solution logo" />
          <div class="brand-copy">
            <div class="header-logo">KVSK CCTV & IT Solution</div>
            <div class="header-sub">Business Entities</div>
          </div>
        </div>
      </button>
    </div>
    <div class="header-right">
      <span class="admin-badge">Administrator Console</span>
      <button class="btn btn-logout btn-sm" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <main class="business-entities-shell">
    <div class="page-hero">
      <div class="page-hero-copy">
        <div class="page-title">Business Entities</div>
        <div class="page-sub">Manage the business titles used to separate project, AP, AR, and report data.</div>
      </div>
    </div>

    <div class="module-page-toolbar business-entities-toolbar">
      <button class="btn btn-cancel btn-sm section-back-btn" type="button" onclick="window.location.href='/admin?view=dashboard'">Back to Dashboard</button>
      <div class="module-page-toolbar-actions">
        <div class="search-wrap top-search-bar module-toolbar-search">
          <input id="business-entity-search" type="text" placeholder="Search code, title, contact, email, or phone..." oninput="renderBusinessEntities()" />
        </div>
        <button class="btn btn-add btn-sm" type="button" onclick="openBusinessEntityModal()" hidden>Add Business Entity</button>
      </div>
    </div>

    <div class="registry-status" id="business-entity-status"></div>

    <section class="registry-panel">
      <div class="registry-table-wrap">
        <table class="registry-table">
          <thead>
            <tr>
              <th>Code</th>
              <th>Business Title</th>
              <th>Contact</th>
              <th>Phone</th>
              <th>Email</th>
              <th>TIN</th>
              <th>Status</th>
              <th>Default</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="business-entities-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar"></div>

  <div class="modal-backdrop" id="business-entity-modal-backdrop" aria-hidden="true">
    <div class="modal modal-business-entity">
      <div class="modal-header modal-header-tight">
        <div class="modal-title">Add Business Entity</div>
        <button class="modal-close" type="button" onclick="closeBusinessEntityModal()" aria-label="Close modal">X</button>
      </div>
      <div class="modal-body">
        <form id="business-entity-form">
          <div class="form-grid">
            <div class="field">
              <label>Entity Code</label>
              <input id="be-entity-code" type="text" maxlength="20" placeholder="Optional, e.g. KVSK" />
            </div>
            <div class="field">
              <label>Business Title *</label>
              <input id="be-company-name" type="text" placeholder="Registered business title" required />
            </div>
            <div class="field full">
              <label>Address</label>
              <input id="be-address" type="text" placeholder="Business address" />
            </div>
            <div class="field">
              <label>Contact Person</label>
              <input id="be-contact-person" type="text" placeholder="Primary contact" />
            </div>
            <div class="field">
              <label>Phone</label>
              <select id="be-phone-country" aria-label="Phone country">
                <option value="PH">PH +63</option>
                <option value="OTHER">Other country</option>
              </select>
              <input id="be-phone" type="text" maxlength="11" inputmode="numeric" placeholder="11 digits, e.g. 09171234567" />
            </div>
            <div class="field">
              <label>Email</label>
              <input id="be-email" type="email" placeholder="Contact email" />
            </div>
            <div class="field">
              <label>TIN</label>
              <input id="be-tin" type="text" placeholder="TIN" />
            </div>
            <div class="field">
              <label>Status</label>
              <select id="be-status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
            <div class="field business-entity-check">
              <label>
                <input id="be-is-default" type="checkbox" />
                Set as default
              </label>
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn btn-cancel" type="button" onclick="closeBusinessEntityModal()">Cancel</button>
            <button class="btn btn-save" id="business-entity-save-btn" type="submit">Save Business Entity</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/business-entities/business-entities.js?v=20260521s"></script>
</body>
</html>
