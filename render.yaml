services:
  - type: web
    name: kinaadman-erp
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run render:start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN_SECONDS
        value: "900"
      - key: SESSION_MAX_AGE_MS
        value: "86400000"
      - key: ALLOW_LEGACY_PLAINTEXT_PASSWORDS
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: APPROVAL_NOTIFY_EMAILS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: uploads-pdf
